<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TCE Application Processing</title>
  <link rel="stylesheet" href="upcoming_request.css">
</head>
<body>

<header>
  <div class="header-content">
    <div class="header-left">
      <a href="college_selection.html" class="home-link" title="Home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      </a>
      <h1>TCE Application Processing</h1>
    </div>

    <div class="header-right">
      <button class="icon-btn" onclick="goBack()" title="Back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      </button>
      <button class="icon-btn logout" onclick="goHome()" title="Logout">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
      </button>
    </div>
  </div>
</header>

<div class="main-controls">
  <div class="left-nav-group">
    <button class="modern-btn" onclick="showSeatPopup()">Seats Remaining</button>
    <button class="modern-btn" onclick="showChangeSeatsPopup()">Edit Alloted Seats</button>
    <button class="modern-btn" onclick="window.location.href='completed.html'">Application Status</button>
    
    <div class="filter-sort-wrapper">
      <button class="filter-sort-toggle" onclick="toggleFilterSort()">Search Specific</button>
      <div id="filterSortPanel" class="filter-sort-panel">
         <label>Recommender</label>
         <select id="recommenderFilter" onchange="filterByRecommender()"></select>
         <label>Dept & Degree</label>
         <select id="combinedFilter" onchange="filterByCombined()"></select>
      </div>
    </div>
  </div>

  <div class="right-search-group">
    <input id="searchInput" class="input-box" placeholder="Search for details..." />
    <button class="submit-input" onclick="handleSearch('UNALLOCATED')">Search</button>
    <button class="maroon-btn clear-search" onclick="clearSearch()">Clear</button>
  </div>
</div>

<div class="content">
    <div class="student-grid" id="studentList">
        </div>
</div>

<div id="seatPopup" class="popup-overlay">
  <div class="popup wide-popup">
    <h3 class="maroon-text">Seat Remaining Status</h3>
    <table id="seatTable" class="neat-table">
      <thead>
        <tr>
          <th>S.No</th>
          <th>Course Name</th>
          <th>Total</th>
          <th>Allocated</th>
          <th>Remaining</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <button class="maroon-btn" onclick="closeSeatPopup()">Close</button>
  </div>
</div>

<div id="changeSeatPopup" class="popup-overlay">
  <div class="popup wide-popup">
    <h3 class="maroon-text">Change Seat Totals</h3>
    <table id="changeSeatTable" class="neat-table">
      <thead>
        <tr>
          <th>S.No</th>
          <th>Course Name</th>
          <th>Total</th>
          <th>Allocated</th>
          <th>Remaining</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <button class="maroon-btn" onclick="saveChangeSeats()">Save</button>
    <button class="maroon-btn" onclick="closeChangeSeatPopup()">Close</button>
  </div>
</div>

<div id="declineModal" class="popup-overlay">
  <div class="popup standard-popup">
    <h3 class="maroon-text">Decline Reason</h3>
    <textarea id="declineComment" class="popup-input" placeholder="Enter reason..." rows="4"></textarea>
    <div class="modal-footer">
      <button class="maroon-btn" onclick="submitDecline()">Submit</button>
      <button class="maroon-btn cancel-btn" onclick="closeDeclineModal()">Cancel</button>
    </div>
  </div>
</div>

<div id="popup-overlay" class="popup-overlay">
  <div class="popup standard-popup">
    <h3 class="maroon-text">Allotment Details</h3>
    <div class="select-group">
        <label>Branch:</label>
        <select id="branchSelect">
          <option value="CSE">CSE</option>
          <option value="IT">IT</option>
          <option value="ECE">ECE</option>
        </select>
        <label>Mode:</label>
        <select id="modeSelect">
          <option value="Aided">Aided</option>
          <option value="Self Finance">Self Finance</option>
        </select>
    </div>
    <div class="modal-footer">
      <button class="maroon-btn" onclick="confirmSelection()">Confirm</button>
      <button class="maroon-btn cancel-btn" onclick="closeSelectionModal()">Cancel</button>
    </div>
  </div>
</div>

<div id="viewMoreOverlay" class="popup-overlay">
    <div class="popup wide-popup">
      <h2 class="maroon-text">Application Details</h2>
      <div id="viewMoreContent"></div>
      <button onclick="closeViewMore()" class="maroon-btn view-more-btn">Close</button>
    </div>
</div>

<script src="env.js"></script>
<script>
  // Serve from http server, not file:
  if (location.protocol === 'file:') {
    console.warn('Running from file: protocol. Please use http-server.');
  }
</script>
<script src="student-fetch.js"></script>
</body>
</html>
