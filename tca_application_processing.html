<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TCA Application Processing</title>
  <link rel="stylesheet" href="tca_application_processing.css">
</head>

<body>

  <header>
    <div class="header-content">
      <div class="header-left">
        <button class="icon-btn home-link" onclick="window.location.href='college_selection.html'" title="Home">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
        </button>
        <h1>TCA Application Processing</h1>
      </div>

      <div class="header-right">
        <button class="icon-btn" onclick="goBack()" title="Back">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
        </button>
        <button class="icon-btn" onclick="goHome()" title="Logout">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <div class="main-controls">
    <div class="left-nav-group">
      <button class="modern-btn" onclick="showSeatPopup()">Remaining Seats</button>
      <button class="modern-btn" onclick="showChangeSeatsPopup()">Change Seats</button>
      <button class="modern-btn" onclick="window.location.href='tca_application_status.html'">Application
        Status</button>

      <div class="filter-sort-wrapper">
        <button class="filter-sort-toggle" onclick="toggleFilterSort()">Search Specific</button>
        <div id="filterSortPanel" class="filter-sort-panel">
          <label>Recommender</label>
          <select id="recommenderFilter" onchange="filterByRecommender()"></select>
          <label>Dept & Degree</label>
          <select id="combinedFilter" onchange="filterByCombined()"></select>
        </div>
      </div>
    </div>

    <div class="right-search-group">
      <input id="searchInput" class="input-box" placeholder="Search for details..." />
      <button class="submit-input" onclick="handleSearch('UNALLOCATED')">Search</button>
      <button class="modern-btn clear-search" onclick="clearSearch()">Clear</button>
    </div>
  </div>

  <div class="content">
    <div class="student-grid" id="studentList">
    </div>
  </div>

  <div id="popup-overlay" class="popup-overlay">
    <div class="popup standard-popup">
      <h3 style="color:var(--maroon)">Allotment Details</h3>
      <label>Degree Type:</label>
      <select id="degreeTypeSelect" class="popup-input" style="width:100%; margin-bottom:15px; padding:8px;"></select>
      <label>Course:</label>
      <select id="courseSelect" class="popup-input" style="width:100%; margin-bottom:15px; padding:8px;"></select>
      <button class="maroon-btn" onclick="confirmSelection()">Confirm</button>
      <button class="maroon-btn" style="background:#666" onclick="closeSelectionModal()">Cancel</button>
    </div>
  </div>

  <div id="seatPopup" class="popup-overlay">
    <div class="popup wide-popup">
      <h3 style="color:var(--maroon)">Remaining Seat Status</h3>
      <table border="1" width="100%" id="seatTable" style="border-collapse: collapse; margin-top: 20px;">
        <thead style="background: var(--maroon); color: white;">
          <tr>
            <th>S.No</th>
            <th>Course Name</th>
            <th>Total</th>
            <th>Allocated</th>
            <th>Remaining</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <button class="maroon-btn" style="margin-top:20px" onclick="closeSeatPopup()">Close</button>
    </div>
  </div>

  <div id="changeSeatPopup" class="popup-overlay">
    <div class="popup wide-popup">
      <h3 class="maroon-text">Change Seat Totals</h3>
      <table id="changeSeatTable" class="neat-table">
        <thead>
          <tr>
            <th>S.No</th>
            <th>Course Name</th>
            <th>Total</th>
            <th>Allocated</th>
            <th>Remaining</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <button class="maroon-btn" onclick="saveChangeSeats()">Save</button>
      <button class="maroon-btn" onclick="closeChangeSeatPopup()">Close</button>
    </div>
  </div>

  <div id="declineModal" class="popup-overlay">
    <div class="popup standard-popup">
      <h3 class="maroon-text">Decline Reason</h3>
      <textarea id="declineComment" class="popup-input" placeholder="Enter reason..." rows="4"></textarea>
      <div class="modal-footer">
        <button class="maroon-btn" onclick="submitDecline()">Submit</button>
        <button class="maroon-btn cancel-btn" onclick="closeDeclineModal()">Cancel</button>
      </div>
    </div>
  </div>

  <div id="popup-overlay" class="popup-overlay">
    <div class="popup standard-popup">
      <h3 class="maroon-text">Allotment Details</h3>
      <div class="select-group">
        <label>Branch:</label>
        <select id="branchSelect">
          <option value="CSE">CSE</option>
          <option value="IT">IT</option>
          <option value="ECE">ECE</option>
        </select>
        <label>Mode:</label>
        <select id="modeSelect">
          <option value="Aided">Aided</option>
          <option value="Self Finance">Self Finance</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="maroon-btn" onclick="confirmSelection()">Confirm</button>
        <button class="maroon-btn cancel-btn" onclick="closeSelectionModal()">Cancel</button>
      </div>
    </div>
  </div>

  <div id="viewMoreOverlay" class="popup-overlay">
    <div class="popup wide-popup">
      <h2 class="maroon-text">Application Details</h2>
      <div id="viewMoreContent"></div>
      <button onclick="closeViewMore()" class="maroon-btn view-more-btn">Close</button>
    </div>
  </div>


  <script src="env.js"></script>
  <script src="auth.js"></script>
  <script src="tca_application_processing.js"></script>
</body>

</html>
