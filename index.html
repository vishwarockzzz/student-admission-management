<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TCE Management Quota Login</title>
  <link rel="stylesheet" href="index.css" />
</head>

<body>

  <div class="header-maroon"></div>

  <div class="title-bar">
    <div class="logo-container">
      <img class="side-image" src="static/images/TCE LOGIN.png" alt="TCE Image" />
    </div>

    <div class="title-text">
      Thiagarajar Group of Institutions
      <span>Management Quota Application Dashboard</span>
    </div>

    <div class="logo-container">
      <img class="side-image" src="static/images/TCA LOGIN.png" alt="TCA Image" />
    </div>
  </div>

  <div class="login-container">
    <div class="login-box">
      <div class="login-header">
        <h3>Login</h3>
        <p>Please enter your credentials</p>
      </div>

      <div class="input-group">
        <label>Email Address</label>
        <input type="email" placeholder="name@tce.edu" id="loginemail" />
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="••••••••" id="loginpassword" />
      </div>

      <button type="button" class="login-btn">
        <span>Sign In</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>

      <div class="login-footer">
        © 2024 Thiagarajar Institutions
      </div>
    </div>
  </div>

  <script src="env.js"></script>
  <script src="index.js?v=2"></script>
</body>

</html>
