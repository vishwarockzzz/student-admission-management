<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Thiagarajar Group of Institutions - MQ Status Dashboard</title>
  <link rel="stylesheet" href="completed.css" />
</head>

<body>
<header>
  <div class="header-content">
    <div class="header-left">
      <a href="college_selection.html" class="home-link" title="Home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      </a>
      <h1>TCE Application Status</h1>
    </div>

    <div class="header-right">
      <button class="icon-btn" onclick="goBack()" title="Back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      </button>
      <button class="icon-btn logout" onclick="goHome()" title="Logout">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
      </button>
    </div>
  </div>
</header>

<div class="top-actions">
  <button class="nav-btn2" onclick="showSeatPopup()">Remaining Seats</button>
  <button class="nav-btn2" id="allStatusBtn" onclick="loadStatus('ALL', this)">All Application Status</button>
  <button class="nav-btn2" onclick="printAllWithUnallocated()">Print All Status</button>
</div>

<div class="status-search-row">
  <div class="status-buttons">
    <button class="status-btn active" onclick="loadStatus('APPROVED', this)">Alloted <br>Application</button>
    <button class="status-btn" onclick="loadStatus('ONHOLD', this)">OnHold <br>Application</button>
    <button class="status-btn" onclick="loadStatus('DECLINED', this)">Declined<br> Application</button>
    <button class="status-btn" onclick="loadStatus('WITHDRAWN', this)">Withdrawn <br>Application</button>
    <div class="export-buttons">
      <button id="allottedBtn" onclick="generateTableView('APPROVED')">Print Allotted </button>
      <button id="declinedBtn" onclick="generateTableView('DECLINED')">Print Declined </button>
    </div>
    </div>
    <div class="right-search-group"> 
    <input id="searchInput" class="input-box" placeholder="Search for details" />
    <button class="submit-input" onclick="handleSearch()">Search</button>
    <button class="clear-input" onclick="clearSearch()">Clear</button>
  </div>
</div>


<!-- Popup Modal -->
<div id="studentPopup" class="popup-overlay">
  <div id="studentTableContainer" class="popup">
    <div class="popup-header">
      <h3 id="popupTitle">Student Status</h3>
      <button onclick="printStudentTable()" class="print-btn">Print</button>
    </div>

    <table id="studentTable">
      <thead><tr id="studentTableHead"></tr></thead>
      <tbody id="studentTableBody"></tbody>
    </table>
    <div id="seatsTableContainer">
    <h3>Seat Status For TCE</h3>
    <table border="1" width="100%" id="seatTable">
      <thead>
        <tr>
          <th>S.No</th>
          <th>Course Name</th>
          <th>Total Seats</th>
          <th>Allocated Seats</th>
          <th>Remaining Seats</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
    

    <div class="popup-footer">
      <button onclick="closeStudentPopup()" class="close-btn">Close</button>
    </div>
  </div>
</div>




<div id="statusTitle" style="text-align: center; font-weight: bold; font-size: 24px; margin: 10px 0;"></div>
<div id="tableViewContainer"></div>

  <div class="content" id="studentCards">
    <!-- Student cards will be inserted here -->
  </div>
</div>
   <div id="declineModal" class="modal">
    <div class="modal-content">
      <h3>Decline Reason</h3>
      <textarea id="declineComment" placeholder="Enter reason..." rows="4" style="width:100%;"></textarea>
      <br/>
      <button onclick="submitDecline()">Submit</button>
      <button onclick="closeDeclineModal()">Cancel</button>
    </div>
  </div>

  <div id="popup-overlay" class="popup-overlay" style="display:none">
    <div class="popup">
      <label for="branchSelect">Choose Branch:</label>
      <select id="branchSelect">
        <option value="CSE">CSE</option>
        <option value="IT">IT</option>
        <option value="ECE">ECE</option>
      </select>

      <label for="modeSelect">Select Mode:</label>
      <select id="modeSelect">
        <option value="Aided">Aided</option>
        <option value="Self Finance">Self Finance</option>
      </select>

      <button onclick="confirmSelection()">Confirm</button>
      <button onclick="closeSelectionModal()">Cancel</button>
    </div>
  </div>
  <!-- View More Popup -->
  <div id="viewMoreOverlay" class="popup-overlay" style="display: none;">
    <div class="popup bordered-popup">
      <h2 class="popup-title">Student Application Details</h2>
      <div class="form-two-column" id="viewMoreContent"></div>
      <button onclick="closeViewMore()" class="close-btn">Close</button>
    </div>
  </div>
<div id="seatPopup" class="popup-overlay" style="display: none;">
  <div id="seatsTableContainer" class="popup">
    <div class="popup-header">
      <h3>Seat Status</h3>
      <button onclick="printSeatsTable()" class="print-btn">Print Table</button>
    </div>
    <table border="1" width="100%" id="seatTable">
      <thead>
        <tr>
          <th>S.No</th>
          <th>Course Name</th>
          <th>Total Seats</th>
          <th>Allocated Seats</th>
          <th>Remaining Seats</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <div class="popup-footer">
      <button onclick="closeSeatPopup()" class="close-btn">Close</button>
    </div>
  </div>
</div>
  <script src="env.js"></script>
  <script src="completed.js"></script>
</body>

</html>
